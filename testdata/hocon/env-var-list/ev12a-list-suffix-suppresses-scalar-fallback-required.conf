# ev12a: S13c.5 — list suffix suppresses scalar env-var fallback (required form)
#
# S13C_EV12_X=scalar is set in the .env sidecar (a non-indexed scalar key).
# No S13C_EV12_X_0 is set, so the list expansion finds zero elements.
# Per S13c.5 the resolver MUST NOT fall back to the bare scalar "scalar";
# the required form must produce a ResolveError.
#
# Spec authority: HOCON.md L902 "only supported for environment variables and
# not system properties or path expressions" — combined with the resolver rule
# that listSuffix=true suppresses the scalar-env-var fallback path entirely.
x = ${S13C_EV12_X[]}
