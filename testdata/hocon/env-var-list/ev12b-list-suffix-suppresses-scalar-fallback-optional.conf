# ev12b: S13c.5 — list suffix suppresses scalar env-var fallback (optional form)
#
# S13C_EV12_X=scalar is set in the .env sidecar (a non-indexed scalar key).
# No S13C_EV12_X_0 is set, so the list expansion finds zero elements.
# Per S13c.5 the resolver MUST NOT fall back to the bare scalar "scalar";
# the optional form must remove the key entirely, producing {}.
#
# Companion to ev12a (required → error). Together they pin the full S13c.5
# suppression rule: neither required nor optional form may consult the bare
# scalar S13C_EV12_X value when listSuffix=true and no _0 is present.
x = ${?S13C_EV12_X[]}
