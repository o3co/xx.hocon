# S18.4: fractional bare-number string with no unit suffix.
# Per-family Lightbend-faithful: duration's no-unit path uses Double*toNanos,
# so fractional is ACCEPTED. getDuration("t", MILLIS) truncates 500500000 nanos → 500 ms.
# Expected: `getDuration("t", MILLIS) == 500` (or 500500000 nanos via getDuration("t")).
t = "500.5"
